@if (item) {
  @if (isGroup) {
    <div class="timeline-item-group">
      <!-- group row placeholder - no bar -->
    </div>
  } @else if (width > 0) {
    <div
      class="timeline-item"
      [style.width.px]="lineWidth"
    >
      <div
        class="bar"
        [class.auto-scheduled]="isAutoScheduled"
        [style.marginLeft.px]="offsetForItem"
        [style.width.px]="width"
        [style.background]="barColor"
        (click)="onItemClick()"
      >
        <div
          class="progress"
          [style.width.px]="widthProgress"
          [style.background]="progressColor"
        ></div>
        @if (showTitleInside && width > 40) {
          <span class="bar-title-inside">{{ titleLabel }}</span>
        }
      </div>
      @if (showTitleRight) {
        <span class="bar-title-right">{{ titleLabel }}</span>
      }
    </div>
  } @else {
    <div class="timeline-item-empty"></div>
  }

  @if (item._SHOWCHILDS !== false && item.childs?.length) {
    @for (child of item.childs; track child.id || child.title) {
      <renwu-timeline-item
        [item]="child"
        [scale]="scale"
        [dateStart]="dateStart"
        [dateEnd]="dateEnd"
        [hours24InDay]="hours24InDay"
        [showTitleInside]="showTitleInside"
        [showTitleRight]="showTitleRight"
        [containerTop]="containerTop"
        [selectMilestone]="selectMilestone"
        [timelineGraphContentBound]="timelineGraphContentBound"
        [depth]="depth + 1"
        (selected)="selected.emit($event)"
        (scrollTo)="scrollTo.emit($event)"
        (issueLaidOut)="issueLaidOut.emit($event)"
        (scrollRight)="scrollRight.emit()"
        (scrollLeft)="scrollLeft.emit()"
        (increaseWidth)="increaseWidth.emit($event)"
      />
    }
  }
}
