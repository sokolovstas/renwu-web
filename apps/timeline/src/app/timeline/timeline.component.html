<div class="timeline-container">
  @if (loading()) {
    <div class="timeline-loading">Loading timeline...</div>
  }

  <renwu-timeline-scale
    [dateStart]="dateStart()"
    [dateEnd]="dateEnd()"
    [isWorkload]="isWorkload()"
    [scaleTick]="settings().scaleTick"
    (changed)="onScaleChanged()"
    (fitToScreen)="onFitToScreen()"
  />

  <renwu-timeline-ruler
    [scale]="settings().scale"
    [scaleTick]="settings().scaleTick"
    [dateStart]="dateStart()"
    [dateEnd]="dateEnd()"
    [selectedUsers]="selectedUsers()"
    [linesOnly]="linesOnly()"
    [selectMilestone]="selectMilestone()"
  />

  <renwu-timeline-roadmap [items]="roadmapItems()" />

  <div class="timeline-layout">
    <div class="timeline-table" [style.width.px]="settings().tableWidth">
      @for (row of rootChild().childs; track row.id || row.title) {
        <renwu-timeline-table-item
          [item]="row"
          [depth]="0"
          [tableWidth]="settings().tableWidth"
          (selected)="onSelected($event)"
          (scrollTo)="onScrollTo($event)"
        />
      }
    </div>

    <div class="timeline-graph" [scrollLeft]="scrollLeftGraph()">
      @for (link of links(); track link.issue.id + '-' + link.link.id + '-' + link.type) {
        <renwu-timeline-link
          [data]="link"
          [dateStart]="dateStart()"
          [scale]="settings().scale"
        />
      }

      @for (row of rootChild().childs; track row.id || row.title) {
        <renwu-timeline-item
          [item]="row"
          [scale]="settings().scale"
          [dateStart]="dateStart()"
          [dateEnd]="dateEnd()"
          [showTitleInside]="settings().showTitleInside"
          [showTitleRight]="settings().showTitleRight"
          [selectMilestone]="selectMilestone()"
          (selected)="onSelected($event)"
          (scrollTo)="onScrollTo($event)"
        />
      }
    </div>
  </div>

  @if (settings().showWorkforce) {
    <div class="timeline-workload">
      <renwu-timeline-workload-user
        [user]="currentUserValue()"
        [workload]="workload()"
      />
    </div>
  }
</div>
