<button
  type="button"
  class="timeline-roadmap-item"
  [class.due]="due"
  [class.selected]="selected"
  (click)="toggleSelect()"
  [attr.aria-label]="item.title"
>
  @if (due && linkWidthPx > 0) {
    <span
      class="timeline-roadmap-item-link"
      [style.left.px]="linkLeftPx"
      [style.width.px]="linkWidthPx"
    ></span>
  }
  <span
    class="timeline-roadmap-item-dot"
    [style.left.px]="plannedPx"
    [title]="item.title"
  ></span>
  <span
    class="timeline-roadmap-item-title"
    [style.left.px]="plannedPx"
    [title]="item.title"
  >
    {{ item.title }}
  </span>
  @if (due) {
    <span
      class="timeline-roadmap-item-triangle"
      [style.left.px]="actualPx"
      [title]="item.title"
    ></span>
  }
</button>
