<div
  class="rw-modal-background {{ state }}"
  (click)="close()"
></div>
<div
  class="rw-modal-wrapper {{ state }}"
  [attr.inert]="state === 'show' ? null : ''"
>
  <div class="rw-modal-title-bar">
    <div class="rw-modal-title">
      <ng-content select="[rwModalHeader]" />
    </div>
    <div class="rw-modal-sub-title">
      <ng-content select="[rwModalSubHeader]" />
    </div>
    <div class="rw-modal-title-buttons">
      <ng-content select="[rwModalHeaderButtons]" />
    </div>
    <rw-button class="rw-modal-close-button"
      typeButton="icon"
      iconClass="close"
      iconSize="x-large"
      (clicked)="close()"
     />
  </div>
  <ng-content select="[rwModalBody]" />
  <ng-content select="[rwModalFooter]" />
</div>
